<div class="card mb-4 border-0 shadow-sm rounded-4">
    <div class="card-body p-4 d-flex flex-column">

        <!-- 标题 + 日期 -->
        <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
            <div>
                <h5 class="card-title fw-bold lh-base mb-2">
                    <a
                        href="{{ publication.link }}"
                        class="text-decoration-none text-dark link-primary"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        {{ publication.title }}
                    </a>
                </h5>

                <div class="small text-secondary">
                    <i class="bi bi-people me-1"></i>
                    {{ publication.authors }}
                </div>
            </div>

            <span class="badge rounded-pill text-bg-light border text-secondary fw-normal">
                {{ publication.published }}
            </span>
        </div>

        <!-- 摘要 -->
        <div class="mb-4">
            <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-file-earmark-text text-primary"></i>
                <span class="small fw-semibold text-uppercase text-secondary">
                    Abstract
                </span>
            </div>

            <p class="card-text text-secondary lh-lg mb-0">
                {{ publication.abstract }}
            </p>
        </div>

        <!-- 底部按钮 -->
        <div class="mt-auto pt-3 border-top d-flex flex-wrap justify-content-between align-items-center gap-3">
            <small class="text-muted">
                <i class="bi bi-calendar3 me-1"></i>
                Published: {{ publication.published }}
            </small>

            <div class="d-flex gap-3">
                <a
                    href="{{ publication.link }}"
                    class="btn btn-outline-primary btn-sm"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    Read More
                    <i class="bi bi-arrow-up-right ms-1"></i>
                </a>

                {% if publication.pdflink %}
                <a
                    href="{{ publication.pdflink }}"
                    class="btn btn-primary btn-sm"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    <i class="bi bi-file-earmark-pdf me-1"></i>
                    PDF
                </a>
                {% endif %}
            </div>
        </div>

    </div>
</div>
