{% extends "layouts/layout.html" %}
{% set hide_sidebar = false %}

{% block head_append %}
<style>
    .login-container {
        max-width: 440px;
        margin: 0 auto;
    }
    .password-toggle {
        cursor: pointer;
    }
</style>
{% endblock %}

{% block main_append %}

<div class="container py-5">
    <div class="login-container">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <img src="/static/images/logo.png" alt="Logo" height="60" class="mb-3">
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Sign in to your Fast Haylen account</p>
                </div>

                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Enter your username" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Enter your password" required>
                            <button class="btn btn-outline-secondary password-toggle" type="button" id="togglePassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-decoration-none small">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-lg mb-3" id="loginBtn">
                        <span id="btnText">Sign In</span>
                        <span class="spinner-border spinner-border-sm d-none" id="btnSpinner" role="status"></span>
                    </button>

                    <div id="alertPlaceholder"></div>
                </form>

                <p class="text-center text-muted mt-3 mb-0">
                    Don't have an account?
                    <a href="/register" class="text-decoration-none">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block script_append %}
<script src="/static/js/pages/login.js"></script>
{% endblock %}
